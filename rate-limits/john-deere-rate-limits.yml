specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: John Deere
providerId: john-deere
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: John Deere does not publish numeric rate limits for the Operations Center / MyJohnDeere
  developer APIs. Limits are applied per partner application and communicated during onboarding.
  Reconciliation blocked pending public rate-limit documentation or partner-program technical
  guidelines.
tags:
  - Agriculture
  - Equipment
  - Machinery
  - Rate Limiting
description: Rate limit artifact for the John Deere developer surface. The provider does not
  publish per-second / per-minute throttle values; partner applications are subject to limits
  set by John Deere at provisioning time and adjusted via the developer-program contact channel.
sources:
  - https://developer.deere.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-application throttle (John Deere Developer Program)
    scope: application
    metric: varies
    limit: see John Deere Developer Program onboarding documentation
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429 / 503 responses
      and honor the Retry-After header when present.
  - name: Partner-Provisioned Limits
    description: Steady-state and burst limits are configured per partner application by John
      Deere; raises are requested through the developer-program contact channel.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
