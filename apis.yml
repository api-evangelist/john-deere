aid: john-deere
name: John Deere
description: >-
  John Deere is a renowned American corporation that specializes in
  manufacturing agricultural, construction, and forestry machinery. The
  company, founded in 1837 by John Deere, has a long history of innovation
  and has become a leader in the industry. John Deere's products include
  tractors, combines, excavators, and other equipment designed to support
  and improve farming and construction operations.
