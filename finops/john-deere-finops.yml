specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: John Deere
providerId: john-deere
publisherName: Deere & Company
serviceCategory: Agriculture / Equipment Telemetry
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: John Deere does not publish public pricing or a usage/billing API for its developer
  program. FinOps shape is inferred from the partner-program model (negotiated contract).
  Meters listed are placeholders aligned to the kinds of usage the Operations Center API
  exposes (machine telemetry events, field operation files, equipment inventory reads).
tags:
  - Agriculture
  - Equipment
  - Machinery
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps scaffold for the John Deere developer program. Treated as
  a negotiated-enterprise relationship; no public usage-billing telemetry is exposed.
sources:
  - https://developer.deere.com/
  - https://www.finops.org/framework/
  - https://focus.finops.org/focus-specification/v1-3/
billingModel:
  pricingCategory: Enterprise / Negotiated
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: John Deere Developer APIs
  ServiceCategory: Agriculture / Equipment Telemetry
  ProviderName: John Deere
  PublisherName: Deere & Company
  InvoiceIssuerName: Deere & Company
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - application
      - api
      - organization
  - name: machine_telemetry_events
    unit: event
    aggregation: sum
    dimensions:
      - organization
      - machine
  - name: file_transfers
    unit: file
    aggregation: count
    dimensions:
      - organization
      - operation
principles:
  - name: Visibility
    description: Track per-application API call volume against the limits provisioned during
      developer-program onboarding; there is no first-party usage-billing API to ingest.
  - name: Allocation
    description: Allocate usage by application_id and organization (dealer / customer account)
      since John Deere scopes API access by partner application and authorized organization.
  - name: Optimization
    description: Reduce machine-telemetry polling cost by subscribing to Operations Center
      webhooks where available and caching equipment / field metadata that changes infrequently.
  - name: Accountability
    description: A named partner-program contact at John Deere is the escalation path for
      limit raises and contract review; pair with an internal API-product owner.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
