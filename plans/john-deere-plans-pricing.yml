specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: John Deere
providerId: john-deere
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: John Deere does not publish public API pricing. Access to the Operations Center / MyJohnDeere
  developer APIs is gated behind partner enrollment and dealer/customer relationships. Pricing,
  quotas, and overage terms are negotiated as part of the partner agreement. Reconciliation
  blocked pending publicly available pricing or partner-program rate sheet.
tags:
  - Agriculture
  - Combines
  - Construction
  - Equipment
  - Forestry
  - Machinery
  - Tractors
description: Plans and pricing artifact for the John Deere developer surface (Operations Center,
  MyJohnDeere, Equipment, Fields, Machine Data). John Deere distributes API access to vetted
  partners through its developer program; commercial terms are not published. Treat this artifact
  as a placeholder until a partner-program rate sheet is obtained.
sources:
  - https://developer.deere.com/
plans:
  - id: john-deere-partner-program
    name: Developer / Partner Program
    type: enterprise
    description: Access to John Deere APIs requires enrollment in the John Deere Developer Program
      and approval as a software partner. Production scopes (machine telemetry, field operations,
      equipment, files) are unlocked per-application after technical and business review. No
      public pricing is published; commercial terms are negotiated bilaterally.
    entries:
      - label: API Access
        name: api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Operations Center API
      - name: MyJohnDeere API
      - name: Partner Developer Program enrollment required
      - name: Dealer / customer authorization required for production scopes
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
