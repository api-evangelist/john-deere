type YieldData {
  id: ID!
  fieldId: ID!
  season: String!
  crop: CropType!
  variety: String
  harvestDate: String
  averageYield: Float!
  yieldUnit: String!
  totalProduction: Float
  productionUnit: String
  area: Float
  areaUnit: String
  moisture: Float
  yieldMap: YieldMap
}

type YieldMap {
  id: ID!
  fieldId: ID!
  season: String
  crop: CropType
  created: String
  imageUrl: String
  vectorUrl: String
  minYield: Float
  maxYield: Float
  avgYield: Float
  yieldUnit: String
  resolution: Float
  resolutionUnit: String
}

type AsAppliedMap {
  id: ID!
  operationId: ID!
  fieldId: ID!
  operationType: OperationType!
  created: String
  imageUrl: String
  vectorUrl: String
  minRate: Float
  maxRate: Float
  avgRate: Float
  rateUnit: String
  coverage: Float
  coverageUnit: String
}

type SoilMoisture {
  id: ID!
  fieldId: ID!
  sensorId: String
  location: GeoPoint
  timestamp: String!
  depth: Float
  depthUnit: String
  volumetricWaterContent: Float
  saturation: Float
  fieldCapacity: Float
  wiltingPoint: Float
