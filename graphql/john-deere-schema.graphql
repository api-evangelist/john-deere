# ─── Imagery and Weather ─────────────────────────────────────────────────────────

type SatelliteImagery {
  id: ID!
  fieldId: ID!
  source: ImagerySource!
  captureDate: String!
  cloudCover: Float
  resolution: Float
  resolutionUnit: String
  ndvi: Float
  ndre: Float
  msavi: Float
  thumbnailUrl: String
  imageUrl: String
  bands: [ImageryBand!]
}

type ImageryBand {
  name: String!
  wavelength: Float
  wavelengthUnit: String
  min: Float
  max: Float
  mean: Float
}

type WeatherData {
  stationId: ID!
  location: GeoPoint
  timestamp: String!
  condition: WeatherCondition
  temperatureC: Float
  temperatureF: Float
  humidity: Float
  dewPointC: Float
  precipitationMm: Float
  windSpeedKph: Float
  windDirectionDeg: Float
  solarRadiation: Float
  evapotranspiration: Float
  pressure: Float
}

type FieldWeather {
  fieldId: ID!
  current: WeatherData
  forecast: [WeatherData!]
  historical: [WeatherData!]
  growingDegreeDays: Float
  cumulativePrecipitation: Float
  frostRisk: Boolean
}

# ─── Irrigation ──────────────────────────────────────────────────────────────────

type Irrigation {
  id: ID!
  fieldId: ID!
  method: IrrigationMethod
  zones: [IrrigationZone!]
  totalWaterApplied: Float
  waterUnit: String
  lastIrrigated: String
  nextScheduled: String
}

type IrrigationZone {
  id: ID!
  irrigationId: ID!
  name: String!
  area: Float
  areaUnit: String
  boundary: Boundary
  flowRate: Float
  flowRateUnit: String
  waterApplied: Float
  waterUnit: String
  soilMoisture: SoilMoisture
  schedule: IrrigationSchedule
}

type IrrigationSchedule {
  zoneId: ID!
  startTime: String
  duration: Int
  durationUnit: String
  frequency: String
  targetMoisture: Float
}

# ─── Query Root ──────────────────────────────────────────────────────────────────

type Query {
  # Organization
  organization(id: ID!): Organization
  organizations: [Organization!]

  # Machines and Fleet
  machine(id: ID!): Machine
  machines(organizationId: ID!): [Machine!]
  fleet(organizationId: ID!): Fleet
  machineLocation(machineId: ID!): MachineLocation
  machineEngineHours(machineId: ID!): EngineHours
  machineFuelUsage(machineId: ID!, period: String): FuelUsage
  machineTelemetry(machineId: ID!, startTime: String, endTime: String): [TelematicsRecord!]
  machineAlerts(machineId: ID!, active: Boolean): [MachineAlert!]
  engineHealth(machineId: ID!): EngineHealth
  faultCodes(machineId: ID!, active: Boolean): [FaultCode!]
  maintenanceAlerts(machineId: ID!): [MaintenanceAlert!]
  serviceRecords(machineId: ID!): [ServiceRecord!]
  operatingHours(machineId: ID!, startDate: String, endDate: String): [OperatingHour!]

  # Equipment
  equipment(id: ID!): Equipment
  equipmentForMachine(machineId: ID!): [Equipment!]

  # Fields
  field(id: ID!): Field
  fields(organizationId: ID!): [Field!]
  fieldBoundary(fieldId: ID!): FieldBoundary
  cropZones(fieldId: ID!): [CropZone!]
  managementZones(fieldId: ID!): [ManagementZone!]

  # Field Operations
  fieldOperation(id: ID!): FieldOperation
  fieldOperations(fieldId: ID!, operationType: OperationType, season: String): [FieldOperation!]

  # Precision Ag
  prescription(id: ID!): Prescription
  prescriptions(fieldId: ID!): [Prescription!]
  prescriptionMap(id: ID!): PrescriptionMap
  yieldData(fieldId: ID!, season: String): [YieldData!]
  yieldMap(id: ID!): YieldMap
  asAppliedMap(id: ID!): AsAppliedMap
  asAppliedMaps(fieldId: ID!, season: String): [AsAppliedMap!]
  precisionAg(fieldId: ID!, season: String): PrecisionAg

  # Soil and Moisture
  soilData(fieldId: ID!): [SoilData!]
  soilMoisture(fieldId: ID!, sensorId: String): [SoilMoisture!]

  # Imagery and Weather
  satelliteImagery(fieldId: ID!, startDate: String, endDate: String): [SatelliteImagery!]
  fieldWeather(fieldId: ID!): FieldWeather

  # Irrigation
  irrigation(fieldId: ID!): Irrigation

  # Seeds and Varieties
  variety(id: ID!): Variety
  varieties(crop: CropType, brand: String): [Variety!]
  seed(id: ID!): Seed
}

# ─── Mutation Root ───────────────────────────────────────────────────────────────

type Mutation {
  # Field management
  createField(organizationId: ID!, name: String!, boundary: ID): Field
  updateField(id: ID!, name: String): Field
  deleteField(id: ID!): Boolean

  # Prescription management
  createPrescription(fieldId: ID!, name: String!, prescriptionType: PrescriptionType!, crop: CropType): Prescription
  updatePrescription(id: ID!, name: String): Prescription
  deletePrescription(id: ID!): Boolean

  # Maintenance
  acknowledgeMaintenanceAlert(id: ID!): MaintenanceAlert
  createServiceRecord(machineId: ID!, serviceType: String!, performedAt: String!, notes: String): ServiceRecord

  # Irrigation scheduling
  updateIrrigationSchedule(zoneId: ID!, startTime: String, duration: Int, targetMoisture: Float): IrrigationSchedule
}
